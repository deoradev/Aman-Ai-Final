    <script>
      (function() {
        try {
          const theme = localStorage.getItem('amandigitalcare-theme');
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
